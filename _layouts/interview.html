---
layout: default
---

<div class="interview-page">
  <!-- Page Header -->
  <header class="page-header">
    <div class="wrapper">
      <a href="/interview_prep/" class="back-link">&larr; Back to Interview Bank</a>
      
      <h1 class="page-title">{{ page.title }}</h1>
      
      {% if page.summary %}
      <p class="page-summary">{{ page.summary }}</p>
      {% endif %}
    </div>
  </header>

  <!-- Main Content -->
  <main class="page-content">
    <div class="wrapper">
      <article>
        {{ content }}
      </article>
      
      <!-- Navigation Breadcrumbs -->
      <nav class="breadcrumb" aria-label="Breadcrumb">
        <ol>
          <li><a href="/">Home</a></li>
          <li><a href="/interview_prep/">Interview Bank</a></li>
          <li aria-current="page">{{ page.title }}</li>
        </ol>
      </nav>
    </div>
  </main>
</div>
