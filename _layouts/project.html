---
layout: default
---

<div class="project-detail-page">
  <!-- Page Header / Hero -->
  <header class="page-hero">
    <div class="container">
      <a href="{{ "/projects.html" | relative_url }}" class="back-link">
        <span class="arrow">&larr;</span> Back to Projects
      </a>
      
      <h1>{{ page.title }}</h1>
      
      {% if page.summary %}
      <p class="page-summary">{{ page.summary }}</p>
      {% endif %}
    </div>
  </header>

  <!-- Main Content -->
  <main class="section-ptb">
    <div class="container">
      <div class="article-content">
        {{ content }}
      </div>
      
      <!-- Navigation Breadcrumbs -->
      <nav class="breadcrumb" aria-label="Breadcrumb">
        <ol>
          <li><a href="{{ "/" | relative_url }}">Home</a></li>
          <li><a href="{{ "/projects.html" | relative_url }}">Projects</a></li>
          <li aria-current="page">{{ page.title }}</li>
        </ol>
      </nav>
    </div>
  </main>
</div>
