<header class="site-header" id="site-header">
  <div class="container header-inner">
    <!-- Brand / Logo -->
    <a href="{{ "/" | relative_url }}" class="site-brand">
      <span class="brand-name">ZINOUN OBAID</span>
      <span class="brand-title">Mechanical & Mechatronics Eng.</span>
    </a>

    <!-- Desktop Navigation -->
    <nav class="desktop-nav" aria-label="Main Navigation">
      <a href="{{ "/" | relative_url }}" class="nav-link {% if page.url == '/' %}active{% endif %}">Home</a>
      <a href="{{ "/projects.html" | relative_url }}" class="nav-link {% if page.url contains '/projects' %}active{% endif %}">Projects</a>
    </nav>

    <!-- Header Actions (Theme + Social + Mobile Toggle) -->
    <div class="header-actions">
      <!-- Social Links (Desktop) -->
      <div class="header-social">
        <a href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
          <i class="fab fa-github"></i>
        </a>
        <a href="{{ site.linkedin_url }}" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
          <i class="fab fa-linkedin-in"></i>
        </a>
        <a href="mailto:{{ site.email }}" aria-label="Email">
          <i class="far fa-envelope"></i>
        </a>
      </div>

      <!-- Theme Toggle Button -->
      <button class="theme-toggle" id="theme-toggle-btn" aria-label="Toggle Theme">
        <i class="fas fa-moon theme-icon-dark"></i>
        <i class="fas fa-sun theme-icon-light" style="display: none;"></i>
      </button>

      <!-- Mobile Nav Toggle Button -->
      <button class="mobile-toggle" id="mobile-toggle-btn" aria-label="Toggle Menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </div>
</header>

<!-- Mobile Navigation Drawer -->
<div class="mobile-nav" id="mobile-nav-drawer">
  <a href="{{ "/" | relative_url }}" class="nav-link {% if page.url == '/' %}active{% endif %}">Home</a>
  <a href="{{ "/projects.html" | relative_url }}" class="nav-link {% if page.url contains '/projects' %}active{% endif %}">Projects</a>
</div>

<!-- Mobile Nav Backdrop -->
<div class="mobile-nav-backdrop" id="mobile-backdrop"></div>
